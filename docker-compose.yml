services:
  backend:
    container_name: workforce-backend
    build:
      context: .
      dockerfile: src/main_module/api/Dockerfile
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s

  frontend:
    depends_on:
      backend:
        condition: service_healthy
    build:
      context: ./src/main_module/visualization
      dockerfile: DockerFile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./src/main_module/visualization:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000

volumes:
  frontend_node_modules:
